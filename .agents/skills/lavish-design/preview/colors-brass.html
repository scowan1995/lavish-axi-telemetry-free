<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="_base.css" />
  </head>
  <body>
    <div class="card">
      <div class="label">Brass — the singular accent</div>
      <div style="display: grid; grid-template-columns: 1.4fr 1fr 1fr; gap: 14px; align-items: stretch">
        <div
          style="
            background: #f4c95d;
            border-radius: 14px;
            padding: 18px;
            color: #17130a;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            min-height: 120px;
          "
        >
          <div style="font-family: var(--font-serif); font-style: italic; font-size: 26px; line-height: 1.05">
            One lamp.<br />One accent.
          </div>
          <div
            style="
              display: flex;
              justify-content: space-between;
              font-family: var(--font-mono);
              font-size: 11px;
              opacity: 0.78;
            "
          >
            <span>brass-500</span><span>#f4c95d</span>
          </div>
        </div>
        <div
          style="
            background: #ffd877;
            border: 1px solid #f4c95d;
            border-radius: 14px;
            padding: 14px;
            color: #17130a;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
          "
        >
          <div style="font-weight: 700">hover</div>
          <div class="mono" style="color: #17130a">#ffd877</div>
        </div>
        <div
          style="
            background: #17130a;
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 14px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
          "
        >
          <div style="font-weight: 700; color: #f4c95d">ink on brass</div>
          <div class="mono">#17130a</div>
        </div>
      </div>
      <div style="font-family: var(--font-serif); font-style: italic; color: var(--fg-dim); font-size: 14px">
        Used for the primary CTA, annotation outlines, selected-text highlights, and the brand mark.
      </div>
    </div>
  </body>
</html>
